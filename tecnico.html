<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnico - Amatec Ordem By Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-cliente.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="btn-close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="cliente.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Clientes</span>
                    </a>
                </li>
                <li>
                    <a href="ordem.html" class="nav-item">
                        <i class="fas fa-tasks"></i>
                        <span>Ordem de Serviço</span>
                    </a>
                </li>
                <li>
                    <a href="produto.html" class="nav-item">
                        <i class="fas fa-box"></i>
                        <span>Produto</span>
                    </a>
                </li>
                <li>
                    <a href="tecnico.html" class="nav-item">
                        <i class="fas fa-user-tie"></i>
                        <span>Técnico</span>
                    </a>
                </li>
                <li class="divider"></li>
                <li>
                    <a href="#" class="nav-item logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <p id="userNameSidebar"></p>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Header com botão Home -->
    <header class="header">
        <div class="header-content">
            <a href="home.html" class="btn-home" title="Voltar para Home">
                <i class="fas fa-home"></i>
            </a>
            <button class="btn-menu-toggle" id="toggleMenu" title="Abrir menu">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Gerenciar Técnicos</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="form-section">
                <h2>Formulário de Técnico</h2>
                <form id="tecnicoForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tecnicoId">ID:</label>
                            <input type="text" id="tecnicoId" name="id" readonly placeholder="Gerado automaticamente">
                        </div>
                        <div class="form-group">
                            <label for="tecnicoNome">Nome:</label>
                            <input type="text" id="tecnicoNome" name="nome" placeholder="Nome do técnico" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="tecnicoStatus">Status:</label>
                            <select id="tecnicoStatus" name="status" required>
                                <option value="">Selecione o status</option>
                                <option value="ativo">Ativo</option>
                                <option value="inativo">Inativo</option>
                                <option value="afastado">Afastado</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                        <button type="button" class="btn btn-secondary">
                            <i class="fas fa-plus"></i> Novo
                        </button>
                    </div>
                </form>
            </div>

            <div class="grid-section">
                <h2>Técnicos Cadastrados</h2>
                <div class="grid-wrapper">
                    <table class="grid-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" class="empty-message">Nenhum técnico cadastrado</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="home.js"></script>
</body>
</html>
