<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Amatec Ordem By Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-home.css">
</head>
<body>
    <!-- Menu Lateral -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="btn-close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="cliente.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Clientes</span>
                    </a>
                </li>
                <li>
                    <a href="ordem.html" class="nav-item">
                        <i class="fas fa-tasks"></i>
                        <span>Ordem de Serviço</span>
                    </a>
                </li>
                <li>
                    <a href="itensOrdem.html" class="nav-item">
                        <i class="fas fa-list"></i>
                        <span>Itens de Ordem</span>
                    </a>
                </li>
                <li>
                    <a href="produto.html" class="nav-item">
                        <i class="fas fa-box"></i>
                        <span>Produto</span>
                    </a>
                </li>
                <li>
                    <a href="tecnico.html" class="nav-item">
                        <i class="fas fa-user-tie"></i>
                        <span>Técnico</span>
                    </a>
                </li>
                <li class="divider"></li>
                <li>
                    <a href="#" class="nav-item logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <p id="userNameSidebar"></p>
        </div>
    </aside>

    <!-- Overlay para fechar menu em mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Button para abrir menu em mobile -->
        <button class="btn-menu-toggle" id="toggleMenu">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Logo e Conteúdo -->
        <div class="home-container">
            <div class="logo-section">
                <img src="assets/logoamatecpequena.png" alt="Amatec Logo" class="logo">
                <h1>Ordem de serviço - Amatec Informática</h1>
                <p class="tagline">Sistema de Gestão de Serviços em T.I</p>
            </div>
        </div>
    </main>

    <script src="home.js"></script>
</body>
</html>
