<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itens de Ordem - Amatec Ordem By Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-cliente.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="btn-close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="cliente.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Clientes</span>
                    </a>
                </li>
                <li>
                    <a href="ordem.html" class="nav-item">
                        <i class="fas fa-tasks"></i>
                        <span>Ordem de Serviço</span>
                    </a>
                </li>
                <li>
                    <a href="itensOrdem.html" class="nav-item">
                        <i class="fas fa-list"></i>
                        <span>Itens de Ordem</span>
                    </a>
                </li>
                <li>
                    <a href="produto.html" class="nav-item">
                        <i class="fas fa-box"></i>
                        <span>Produto</span>
                    </a>
                </li>
                <li>
                    <a href="tecnico.html" class="nav-item">
                        <i class="fas fa-user-tie"></i>
                        <span>Técnico</span>
                    </a>
                </li>
                <li class="divider"></li>
                <li>
                    <a href="#" class="nav-item logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <p id="userNameSidebar"></p>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Header com botão Home -->
    <header class="header">
        <div class="header-content">
            <a href="home.html" class="btn-home" title="Voltar para Home">
                <i class="fas fa-home"></i>
            </a>
            <button class="btn-menu-toggle" id="toggleMenu" title="Abrir menu">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Gerenciar Itens de Ordem</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="form-section">
                <h2>Formulário de Itens da Ordem</h2>
                <form id="itemOrdemForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemOrdemId">ID:</label>
                            <input type="text" id="itemOrdemId" name="id" readonly placeholder="Gerado automaticamente">
                        </div>
                        <div class="form-group">
                            <label for="itemOrdemOrdem">Ordem:</label>
                            <input type="text" id="itemOrdemOrdem" name="ordem" placeholder="ID ou número da ordem" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemOrdemProduto">Produto:</label>
                            <input type="text" id="itemOrdemProduto" name="produto" placeholder="ID ou nome do produto" required>
                        </div>
                        <div class="form-group">
                            <label for="itemOrdemValor">Valor (R$):</label>
                            <input type="number" id="itemOrdemValor" name="valor" step="0.01" min="0" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemOrdemQtd">Quantidade:</label>
                            <input type="number" id="itemOrdemQtd" name="qtd" min="1" placeholder="1" required>
                        </div>
                        <div class="form-group">
                            <label for="itemOrdemPercDesconto">% Desconto:</label>
                            <input type="number" id="itemOrdemPercDesconto" name="percDesconto" step="0.01" min="0" placeholder="0.00">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemOrdemSubtotal">Subtotal (R$):</label>
                            <input type="number" id="itemOrdemSubtotal" name="subtotal" step="0.01" min="0" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="itemOrdemStatus">Status:</label>
                            <select id="itemOrdemStatus" name="status">
                                <option value="">Selecione o status</option>
                                <option value="pendente">Pendente</option>
                                <option value="confirmado">Confirmado</option>
                                <option value="cancelado">Cancelado</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                        <button type="button" class="btn btn-secondary">
                            <i class="fas fa-plus"></i> Novo
                        </button>
                    </div>
                </form>
            </div>

            <div class="grid-section">
                <h2>Itens da Ordem Cadastrados</h2>
                <div class="grid-wrapper">
                    <table class="grid-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ordem</th>
                                <th>Produto</th>
                                <th>Valor</th>
                                <th>Qtd</th>
                                <th>% Desconto</th>
                                <th>Subtotal</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="9" class="empty-message">Nenhum item cadastrado</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="home.js"></script>
</body>
</html>
