<!-- frontend/public/index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Suporte TI - Amatec</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="#" id="home-link">Amatec Suporte</a></h1>
            <nav>
                <button id="nav-login-cliente" class="nav-button">Login Cliente</button>
                <button id="nav-login-admin" class="nav-button">Login Admin</button>
                <button id="nav-abrir-ticket" class="nav-button">Abrir Ticket</button>
                <button id="nav-meus-tickets" class="nav-button hidden">Meus Tickets</button>
                <button id="nav-painel-admin" class="nav-button hidden">Painel Admin</button>
                <button id="nav-logout" class="nav-button hidden">Sair</button>
            </nav>
        </div>
    </header>

    <main id="app-content" class="container">
        <section id="welcome-section" class="page-section">
            <h2>Bem-vindo ao Sistema de Suporte Amatec</h2>
            <p>Para solicitar suporte, abra um ticket. Se você já é cliente, faça login para acompanhar suas solicitações.</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Amatec Informática. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
